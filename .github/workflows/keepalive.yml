name: Keep Streamlit App Awake

on:
  schedule:
    # Ping every 5 minutes, 24/7 — prevents Streamlit Cloud from sleeping the app
    - cron: '*/5 * * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}" \
            --max-time 30 \
            "https://qasimtalajawala-crypto-tracker-app-u9rk6k.streamlit.app/" \
            || true
